# Fault 1: CrashLoopBackOff
# Container starts, logs a fatal error, and exits 1.
# Expected steady state: pod restarting with reason CrashLoopBackOff.
# Root cause is only visible in container logs: the FATAL database line.
apiVersion: v1
kind: Namespace
metadata:
  name: fault-crashloop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: fault-crashloop
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              echo "starting api server v1.4.2";
              echo "FATAL: cannot connect to database db.internal:5432 - connection refused" >&2;
              sleep 2;
              exit 1
