# Fault 5: Missing ConfigMap reference
# Container sources env from a ConfigMap that does not exist.
# Expected steady state: waiting reason CreateContainerConfigError,
# event "configmap app-config not found".
apiVersion: v1
kind: Namespace
metadata:
  name: fault-configmap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: fault-configmap
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          envFrom:
            - configMapRef:
                name: app-config
