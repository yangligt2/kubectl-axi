# Scenario 16: quiet-ops - alarming-looking but healthy (false-positive
# control). A Completed migration Job and a web pod that crashed once at
# startup (cold flag file) and has been stable since. Nothing is broken;
# the correct diagnosis is a confident "nothing".
apiVersion: v1
kind: Namespace
metadata:
  name: quiet-ops
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: quiet-ops
spec:
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36
          command: ["sh", "-c", "echo 'migration 0042 applied'; exit 0"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: quiet-ops
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              if [ ! -f /flag/warm ]; then
              touch /flag/warm;
              echo "transient startup blip - cache cold" >&2;
              exit 1;
              fi;
              while true; do sleep 3600; done
          volumeMounts:
            - name: flag
              mountPath: /flag
      volumes:
        - name: flag
          emptyDir: {}
