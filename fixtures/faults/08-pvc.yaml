# Fault 8: Pending PVC
# The PVC requests a StorageClass that does not exist, so it never binds;
# the pod that mounts it stays Pending.
# Expected steady state: PVC Pending, pod Pending with
# "pod has unbound immediate PersistentVolumeClaims".
# Diagnosis requires walking pod -> PVC -> StorageClass.
apiVersion: v1
kind: Namespace
metadata:
  name: fault-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-cache
  namespace: fault-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: fault-pvc
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-cache
