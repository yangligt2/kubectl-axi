# Fixture 12: Healthy namespace (not a fault)
# A fully working deployment and service with matching selectors.
# Tests AXI P5 (definitive empty states): "nothing is wrong here" must be
# a confident, definitive answer, not a hedge.
apiVersion: v1
kind: Namespace
metadata:
  name: healthy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: healthy
  labels:
    app: storefront
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storefront
  template:
    metadata:
      labels:
        app: storefront
    spec:
      containers:
        - name: storefront
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: healthy
spec:
  selector:
    app: storefront
  ports:
    - port: 80
      targetPort: 80
