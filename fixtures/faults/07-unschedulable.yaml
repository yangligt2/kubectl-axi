# Fault 7: Unschedulable pod
# nodeSelector requires a label no node carries.
# Expected steady state: pod Pending, PodScheduled condition False
# with reason Unschedulable ("didn't match Pod's node affinity/selector").
apiVersion: v1
kind: Namespace
metadata:
  name: fault-unschedulable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-indexer
  namespace: fault-unschedulable
  labels:
    app: search-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-indexer
  template:
    metadata:
      labels:
        app: search-indexer
    spec:
      nodeSelector:
        disktype: ssd-nvme-gen5
      containers:
        - name: indexer
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
