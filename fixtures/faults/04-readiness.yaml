# Fault 4: Failing readiness probe
# nginx listens on 80; the readiness probe targets port 8080.
# Expected steady state: pod Running but never Ready (0/1).
apiVersion: v1
kind: Namespace
metadata:
  name: fault-readiness
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fault-readiness
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
